<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍉 2차 암기 플래너</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f13; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { opacity: 1; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #1a1a22; }
::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useMemo, useRef, createElement: h } = React;

const SUBJECTS = [
  { key: "노동", label: "노동법", total: 741, emoji: "📚", color: "#e8604c" },
  { key: "행쟁", label: "행정쟁송법", total: 360, emoji: "⚖️", color: "#4c8ee8" },
  { key: "인사", label: "인사노무관리", total: 800, emoji: "👥", color: "#4cba7a" },
  { key: "경조", label: "경영조직론", total: 672, emoji: "💼", color: "#c87dd4" },
];

const END_DATE = new Date(2026, 5, 30);
const START_DATE = new Date(2026, 3, 12);
const LOW_DAYS = new Set(["2026-04-10", "2026-04-11"]);

function toKey(d) {
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function getToday() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function getWeight(d) {
  const wd=d.getDay(), base=(wd===0||wd===6)?2:1;
  return LOW_DAYS.has(toKey(d))?base*0.1:base;
}
function formatDate(d){ return (d.getMonth()+1)+"/"+String(d.getDate()).padStart(2,"0"); }

// 날짜 배열 생성
function getDays(from, to) {
  const days=[]; let d=new Date(from);
  while(d<=to){ days.push(new Date(d)); d.setDate(d.getDate()+1); }
  return days;
}

// 남은 분량을 날짜 배열에 가중치 비례 배분
function distributePages(left, days) {
  const weights = days.map(d=>getWeight(d));
  const totalW = weights.reduce((a,b)=>a+b,0);
  if(totalW===0 || left===0) return days.map(()=>0);
  const raw = weights.map(w=>w*left/totalW);
  const floored = raw.map(v=>Math.floor(v));
  let rem = left - floored.reduce((a,b)=>a+b,0);
  raw.map((v,i)=>({i,frac:v-Math.floor(v)}))
    .sort((a,b)=>b.frac-a.frac)
    .forEach(({i})=>{ if(rem>0){floored[i]++;rem--;} });
  return floored;
}

// 오늘 할당량 계산 (초기 progress 기준, 1회만 호출)
function calcTodayAlloc(initProgress) {
  const today = getToday();
  const from = today < START_DATE ? START_DATE : today;
  const allDays = getDays(from, END_DATE);
  const result = {};
  for(const s of SUBJECTS) {
    const left = Math.max(0, s.total-(initProgress[s.key]||0));
    const dist = distributePages(left, allDays);
    // 오늘이 allDays[0]
    result[s.key] = dist[0] || 0;
  }
  return result;
}

// 내일부터 일정 빌드 (현재 progress + 고정된 오늘 할당량 기준)
function buildSchedule(progress, todayAlloc, todayCumFixed) {
  const today = getToday();
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const futureDays = getDays(tomorrow, END_DATE);
  const MONTH_LABELS = {4:"4월 🌷",5:"5월 🌿",6:"6월 ☀️"};
  const dayNames = ["일","월","화","수","목","금","토"];

  // 내일부터 각 과목 배분
  // 남은 분량 = total - progress - todayAlloc (오늘 할 분량 제외)
  const futureAlloc = futureDays.map(()=>Object.fromEntries(SUBJECTS.map(s=>[s.key,0])));
  for(const s of SUBJECTS) {
    // 오늘 기준점 = 실제 진도와 (초기진도+오늘할당) 중 큰 값
    const doneAfterToday = Math.min(s.total, Math.max(progress[s.key]||0, todayCumFixed[s.key]));
    const left = Math.max(0, s.total - doneAfterToday);
    const dist = distributePages(left, futureDays);
    dist.forEach((v,i)=>{ futureAlloc[i][s.key]=v; });
  }

  // 오늘 행 누적값 = 고정 목표값 (일정표에 목표 표시용)
  const todayCum = {...todayCumFixed};

  // 전체 schedule (오늘 + 내일~)
  const schedule = [];
  const todayKey = toKey(today);
  const scheduleStart = today < START_DATE ? START_DATE : today;
  if(scheduleStart <= END_DATE) {
    schedule.push({
      date:new Date(today), key:todayKey,
      day:dayNames[today.getDay()],
      cum:{...todayCum}, daily:{...todayAlloc},
      isLow:LOW_DAYS.has(todayKey),
      isWeekend:today.getDay()===0||today.getDay()===6,
      isToday:true,
    });
  }

  // 내일부터 누적 시작점 = 실제 현재 진도 (초과 달성 반영)
  const cumStart = Object.fromEntries(SUBJECTS.map(s=>[s.key, Math.max(todayCum[s.key], progress[s.key]||0)]));
  const cum = {...cumStart};
  futureDays.forEach((date,i)=>{
    const daily={...futureAlloc[i]};
    for(const s of SUBJECTS) cum[s.key]=Math.min(s.total,cum[s.key]+daily[s.key]);
    schedule.push({
      date:new Date(date), key:toKey(date),
      day:dayNames[date.getDay()],
      cum:{...cum}, daily,
      isLow:LOW_DAYS.has(toKey(date)),
      isWeekend:date.getDay()===0||date.getDay()===6,
      isToday:false,
    });
  });

  return schedule;
}

function groupSchedule(schedule) {
  const refDate=new Date(2026,3,12);
  const grouped=[]; let curMonth=null,curWeek=null,weekRows=[],monthWeeks=[];
  for(const row of schedule){
    const month=row.date.getMonth()+1;
    const weekNum=Math.floor((row.date-refDate)/(7*86400000));
    if(month!==curMonth){
      if(weekRows.length) monthWeeks.push(weekRows);
      if(monthWeeks.length) grouped.push({month:curMonth,weeks:monthWeeks});
      curMonth=month; monthWeeks=[]; weekRows=[]; curWeek=weekNum;
    }
    if(weekNum!==curWeek){ if(weekRows.length) monthWeeks.push(weekRows); weekRows=[]; curWeek=weekNum; }
    weekRows.push(row);
  }
  if(weekRows.length) monthWeeks.push(weekRows);
  if(monthWeeks.length) grouped.push({month:curMonth,weeks:monthWeeks});
  return grouped;
}

const MONTH_LABELS = {4:"4월 🌷",5:"5월 🌿",6:"6월 ☀️"};

function App() {
  const loadProgress = () => {
    try {
      const params = new URLSearchParams(window.location.search);
      const result = {};
      let hasData = false;
      for(const s of SUBJECTS) {
        const v = parseInt(params.get(s.key));
        result[s.key] = (!isNaN(v) && v >= 0) ? v : 0;
        if(!isNaN(v) && v > 0) hasData = true;
      }
      if(hasData) return result;
      // URL에 없으면 localStorage 시도
      const saved = localStorage.getItem('study_progress');
      if(saved) return JSON.parse(saved);
    } catch(e) {}
    return Object.fromEntries(SUBJECTS.map(s=>[s.key,0]));
  };
  const initProgress = loadProgress();
  const [progress, setProgress] = useState(initProgress);
  const [editing, setEditing] = useState(null);
  const [inputVal, setInputVal] = useState("");

  // 오늘 할당량: 앱 로드 시 1회만 계산, 절대 변경 안됨
  const todayAllocRef = useRef(null);
  const todayCumRef = useRef(null);
  if(!todayAllocRef.current) {
    todayAllocRef.current = calcTodayAlloc(initProgress);
    // cumTarget = 초기진도 + 오늘할당 → 고정
    todayCumRef.current = Object.fromEntries(
      SUBJECTS.map(s=>[s.key, Math.min(s.total, (initProgress[s.key]||0) + todayAllocRef.current[s.key])])
    );
  }
  const todayAlloc = todayAllocRef.current;
  const todayCumFixed = todayCumRef.current;

  const schedule = useMemo(()=>buildSchedule(progress, todayAlloc, todayCumFixed),[progress]);
  const grouped = useMemo(()=>groupSchedule(schedule),[schedule]);
  const todayRow = schedule.find(r=>r.isToday);
  const totals = Object.fromEntries(SUBJECTS.map(s=>[s.key,s.total]));
  const allDone = SUBJECTS.every(s=>(progress[s.key]||0)>=s.total);
  const totalDone = SUBJECTS.reduce((a,s)=>a+(progress[s.key]||0),0);
  const totalTotal = SUBJECTS.reduce((a,s)=>a+s.total,0);
  const todayTotal = Object.values(todayAlloc).reduce((a,b)=>a+b,0);
  const totalPagesLeft = SUBJECTS.reduce((a,s)=>a+Math.max(0,s.total-(progress[s.key]||0)),0);

  const handleSave=(key)=>{
    const num=parseInt(inputVal);
    const max=SUBJECTS.find(s=>s.key===key).total;
    if(!isNaN(num)&&num>=0&&num<=max){
      const newProgress = {...progress,[key]:num};
      setProgress(newProgress);
      try {
        localStorage.setItem('study_progress', JSON.stringify(newProgress));
        // URL 파라미터 업데이트 (북마크 저장용)
        const params = new URLSearchParams();
        for(const s of SUBJECTS) params.set(s.key, newProgress[s.key]||0);
        const newUrl = window.location.pathname + '?' + params.toString();
        window.history.replaceState(null, '', newUrl);
      } catch(e){}
    }
    setEditing(null);
  };

  return h("div",{style:{minHeight:"100vh",background:"#0f0f13",color:"#f0ede8",fontFamily:"Georgia,serif",paddingBottom:80}},

    h("div",{style:{background:"linear-gradient(135deg,#1a1a22,#12121a)",borderBottom:"1px solid #2a2a35",padding:"24px 20px 20px",position:"sticky",top:0,zIndex:100}},
      h("div",{style:{maxWidth:480,margin:"0 auto"}},
        h("div",{style:{fontSize:11,letterSpacing:3,color:"#6b6880",marginBottom:3,textTransform:"uppercase"}},"🍉 2차"),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14}},
          h("div",{style:{fontSize:20,fontWeight:"bold"}},"암기 플래너 📖"),
          h("div",{style:{fontSize:11,color:"#4cba7a",background:"rgba(76,186,122,0.1)",border:"1px solid #4cba7a44",borderRadius:6,padding:"3px 8px"}},"🎯 6/30 완료 고정")
        ),
        h("div",{style:{marginBottom:12}},
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
            h("span",{style:{fontSize:10,color:"#6b6880"}},"전체 진도"),
            h("span",{style:{fontSize:10,color:"#9994a8"}},totalDone+" / "+totalTotal+"p ("+Math.round(totalDone/totalTotal*100)+"%)")
          ),
          h("div",{style:{height:3,background:"#2a2a35",borderRadius:2,overflow:"hidden"}},
            h("div",{style:{height:"100%",width:Math.round(totalDone/totalTotal*100)+"%",background:"linear-gradient(90deg,#e8604c,#c87dd4)",borderRadius:2,transition:"width 0.4s"}})
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          ...SUBJECTS.map(s=>{
            const cur=progress[s.key]||0, pct=Math.min(100,Math.round(cur/s.total*100)), isEdit=editing===s.key;
            return h("div",{key:s.key,style:{background:"#1e1e28",borderRadius:10,padding:"10px 12px",cursor:"pointer",border:isEdit?`1px solid ${s.color}`:"1px solid #2a2a35",transition:"border-color 0.15s"},
              onClick:()=>!isEdit&&(setEditing(s.key),setInputVal(String(cur)))},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
                h("span",{style:{fontSize:11,color:"#9994a8"}},s.emoji+" "+s.label),
                isEdit
                  ? h("div",{style:{display:"flex",gap:4},onClick:e=>e.stopPropagation()},
                      h("input",{type:"number",value:inputVal,onChange:e=>setInputVal(e.target.value),
                        onKeyDown:e=>e.key==="Enter"&&handleSave(s.key),autoFocus:true,
                        style:{width:52,background:"#0f0f13",border:`1px solid ${s.color}`,color:"#f0ede8",borderRadius:4,padding:"2px 4px",fontSize:12,textAlign:"right"}}),
                      h("button",{onClick:()=>handleSave(s.key),style:{background:s.color,border:"none",borderRadius:4,color:"#fff",fontSize:11,padding:"2px 6px",cursor:"pointer"}},"✓")
                    )
                  : h("span",{style:{fontSize:13,fontWeight:"bold",color:s.color}},cur,h("span",{style:{color:"#6b6880",fontSize:11}},"/"+s.total))
              ),
              h("div",{style:{height:4,background:"#2a2a35",borderRadius:2,overflow:"hidden"}},
                h("div",{style:{height:"100%",width:pct+"%",background:s.color,borderRadius:2,transition:"width 0.4s"}})
              ),
              h("div",{style:{fontSize:10,color:"#6b6880",marginTop:4}},pct+"% · 남은 "+Math.max(0,s.total-cur)+"p")
            );
          })
        ),
        allDone&&h("div",{style:{marginTop:10,textAlign:"center",fontSize:14,color:"#f0d060",padding:"8px",borderRadius:8,background:"rgba(240,208,96,0.08)",border:"1px solid rgba(240,208,96,0.2)"}},"🎉 전과목 완료! 결정했으니까, 된다. 💪🏻")
      )
    ),

    h("div",{style:{maxWidth:480,margin:"0 auto",padding:"16px 16px 0"}},

      todayRow&&!allDone&&h("div",{style:{background:"linear-gradient(135deg,#1e1e2e,#1a1a28)",border:"1px solid #3a3a50",borderRadius:12,padding:"14px 16px",marginBottom:16}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          h("div",{style:{fontSize:11,letterSpacing:2,color:"#6b6880",textTransform:"uppercase"}},"오늘 목표 · "+formatDate(todayRow.date)+" "+todayRow.day),
          h("div",{style:{fontSize:12,color:"#f0d060",fontWeight:"bold"}},"총 "+todayTotal+"p")
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
          ...SUBJECTS.map(s=>{
            const todayAmt = todayAlloc[s.key];
            const cumTarget = todayCumFixed[s.key];
            const cur = progress[s.key]||0;
            const done = cur >= cumTarget;
            return h("div",{key:s.key,style:{background:done?"rgba(76,186,122,0.08)":"#12121a",border:`1px solid ${done?"#4cba7a44":"#2a2a35"}`,borderRadius:8,padding:"8px 10px"}},
              h("div",{style:{fontSize:11,color:s.color,marginBottom:2}},s.emoji+" "+s.key),
              h("div",{style:{fontSize:17,fontWeight:"bold",color:done?"#4cba7a":"#f0ede8"}},"+"+todayAmt+"p"),
              h("div",{style:{fontSize:10,color:"#6b6880",marginTop:2}},"누적 "+cumTarget+"p "+(done?"✓":"· 현재 "+cur))
            );
          })
        ),
        h("div",{style:{marginTop:10,fontSize:10,color:"#4a4860",textAlign:"center"}},"진도 입력 시 내일부터 자동 재배분 · 남은 "+totalPagesLeft+"p")
      ),

      ...grouped.map(({month,weeks})=>
        h("div",{key:month},
          h("div",{style:{fontSize:12,fontWeight:"bold",letterSpacing:2,color:"#6b6880",margin:"16px 0 8px"}},MONTH_LABELS[month]||month+"월"),
          ...weeks.map((rows,wi)=>
            h("div",{key:wi,style:{background:"#1a1a22",borderRadius:10,marginBottom:6,overflow:"hidden",border:"1px solid #22222e"}},
              ...rows.map((row,i)=>{
                const rowAllDone=SUBJECTS.every(s=>row.cum[s.key]>=s.total);
                const rowTotal=Object.values(row.daily).reduce((a,b)=>a+b,0);
                return h("div",{key:row.key,style:{display:"flex",alignItems:"center",padding:"7px 12px",borderBottom:i<rows.length-1?"1px solid #22222e":"none",background:row.isToday?"rgba(255,220,100,0.04)":"transparent",borderLeft:row.isToday?"2px solid #f0d060":"2px solid transparent"}},
                  h("div",{style:{width:44,flexShrink:0}},
                    h("div",{style:{fontSize:12,fontWeight:row.isToday?"bold":"normal",color:row.isToday?"#f0d060":row.isWeekend?"#9994a8":"#c8c4d8"}},formatDate(row.date)),
                    h("div",{style:{fontSize:10,color:row.isToday?"#f0d060":"#4a4860"}},row.day+(row.isLow?"⚠️":""))
                  ),
                  h("div",{style:{width:28,flexShrink:0,textAlign:"center",fontSize:10,color:row.isToday?"#f0d060":"#4a4860",marginRight:6}},"+"+rowTotal),
                  h("div",{style:{display:"flex",gap:6,flex:1,flexWrap:"wrap"}},
                    ...SUBJECTS.map(s=>{
                      const cumTarget=row.cum[s.key];
                      const reached=(progress[s.key]||0)>=cumTarget;
                      return h("div",{key:s.key},
                        h("span",{style:{fontSize:10,color:reached?"#33333f":s.color}},s.key),
                        h("span",{style:{fontSize:11,marginLeft:1,color:reached?"#33333f":"#9994a8",textDecoration:reached?"line-through":"none"}},
                          row.isToday ? (progress[s.key]||0)+"/"+cumTarget : cumTarget
                        )
                      );
                    })
                  ),
                  rowAllDone&&h("span",{style:{fontSize:12,flexShrink:0}},"✅")
                );
              })
            )
          )
        )
      ),

      h("div",{style:{textAlign:"center",padding:"24px 0 16px",color:"#3a3850",fontSize:11}},
        "6/30 완료 고정 · 진도 입력 시 내일부터 자동 재배분",
        h("br"),
        h("button",{
          onClick:()=>{
            if(confirm("진도를 전체 초기화할까요?")){
              const reset=Object.fromEntries(SUBJECTS.map(s=>[s.key,0]));
              setProgress(reset);
              try{
                localStorage.removeItem('study_progress');
                window.history.replaceState(null,'',window.location.pathname);
              }catch(e){}
              todayAllocRef.current=null;
              todayCumRef.current=null;
            }
          },
          style:{marginTop:12,background:"transparent",border:"1px solid #3a3850",color:"#6b6880",borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer"}
        },"🔄 진도 초기화"),
        h("br"),
        h("button",{
          onClick:()=>{
            try{
              navigator.clipboard.writeText(window.location.href);
              alert("URL 복사 완료! 사파리 북마크에 저장하세요 📌");
            }catch(e){
              prompt("이 URL을 북마크에 저장하세요:", window.location.href);
            }
          },
          style:{marginTop:8,background:"transparent",border:"1px solid #3a3a50",color:"#6b6880",borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer"}
        },"📌 현재 진도 URL 복사")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
