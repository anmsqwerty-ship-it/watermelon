<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="work-tracker">
<title>업무 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --text: #e8e8f0;
    --muted: #6666880;
    --muted2: #888899;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 8px;
  }

  .title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted2);
    text-transform: uppercase;
    margin-bottom: 8px;
  }


  .date-display {
    font-size: 13px;
    color: var(--muted2);
    font-family: 'Space Mono', monospace;
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    transition: border-color 0.2s;
  }

  .card:focus-within {
    border-color: var(--accent4);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
  }

  .emoji {
    font-size: 22px;
    line-height: 1;
  }

  .book-name {
    font-size: 15px;
    color: var(--text);
  }

  .total-pages {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    background: var(--surface2);
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Progress bar */
  .bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 0%;
    max-width: 100%;
  }

  .bar-fill.c0 { background: linear-gradient(90deg, #ff6b6b, #ff9e7d); }
  .bar-fill.c1 { background: linear-gradient(90deg, #ffd93d, #ffec80); }
  .bar-fill.c2 { background: linear-gradient(90deg, #6bcb77, #a3e6ab); }
  .bar-fill.c3 { background: linear-gradient(90deg, #4d96ff, #90bfff); }

  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
  }

  .stat-val.pct { font-size: 24px; }

  .stat-val.c0 { color: #ff6b6b; }
  .stat-val.c1 { color: #ffd93d; }
  .stat-val.c2 { color: #6bcb77; }
  .stat-val.c3 { color: #4d96ff; }

  .stat-val.remain { color: var(--muted2); font-size: 16px; }

  /* Input row */
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .input-label {
    font-size: 12px;
    color: var(--muted2);
    white-space: nowrap;
  }

  .page-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    padding: 8px 12px;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }

  .page-input:focus {
    border-color: var(--accent4);
  }

  .save-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .save-btn:active {
    background: var(--accent4);
    border-color: var(--accent4);
    color: #fff;
  }

  /* Summary */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }

  .summary-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted2);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .summary-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .summary-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .summary-emoji { font-size: 14px; width: 20px; text-align: center; }

  .summary-bar-wrap {
    flex: 1;
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .summary-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  .summary-bar-fill.c0 { background: #ff6b6b; }
  .summary-bar-fill.c1 { background: #ffd93d; }
  .summary-bar-fill.c2 { background: #6bcb77; }
  .summary-bar-fill.c3 { background: #4d96ff; }

  .summary-pct {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    width: 36px;
    text-align: right;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent3);
    color: #0e1f10;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Reset btn */
  .reset-area {
    text-align: center;
    margin-top: 8px;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted2);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    padding: 8px;
    opacity: 0.5;
  }

  .reset-btn:active { opacity: 1; color: var(--accent1); }

  /* Firework dot */
  @keyframes pop {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .complete-badge {
    display: none;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent3);
    color: #0e1f10;
  }

  .is-complete .complete-badge { display: inline; }
</style>
</head>
<body>

<header>
  <div class="title">WORK TRACKER</div>
  <div class="date-display" id="dateDisplay"></div>
</header>

<div class="summary-box">
  <div class="summary-title">OVERALL PROGRESS</div>
  <div class="summary-bars" id="summaryBars"></div>
</div>

<div class="cards" id="cardsContainer"></div>

<div class="reset-area">
  <button class="reset-btn" onclick="confirmReset()">⟳ 전체 초기화</button>
</div>

<div class="toast" id="toast">저장됐어요 ✓</div>

<script>
const BOOKS = [
  { emoji: '🍔', total: 723, color: 'c0' },
  { emoji: '🧳', total: 347, color: 'c1' },
  { emoji: '👩🏻‍💻', total: 800, color: 'c2' },
  { emoji: '🦐', total: 672, color: 'c3' },
];

const STORAGE_KEY = 'study_progress_v1';

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let progress = loadProgress();

function pct(current, total) {
  return Math.min(100, Math.round((current / total) * 1000) / 10);
}

function renderDate() {
  const d = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${days[d.getDay()]}`;
}

function renderSummary() {
  const el = document.getElementById('summaryBars');
  el.innerHTML = BOOKS.map((b, i) => {
    const cur = progress[i] || 0;
    const p = pct(cur, b.total);
    return `
      <div class="summary-row">
        <span class="summary-emoji">${b.emoji}</span>
        <div class="summary-bar-wrap">
          <div class="summary-bar-fill ${b.color}" style="width:${p}%"></div>
        </div>
        <div class="summary-pct">${p}%</div>
      </div>`;
  }).join('');
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = BOOKS.map((b, i) => {
    const cur = progress[i] || 0;
    const p = pct(cur, b.total);
    const remain = b.total - cur;
    const isComplete = cur >= b.total;
    return `
    <div class="card ${isComplete ? 'is-complete' : ''}" id="card-${i}">
      <div class="card-header">
        <div class="card-title">
          <span class="emoji">${b.emoji}</span>
          <span class="complete-badge">DONE</span>
        </div>
        <span class="total-pages">/ ${b.total}p</span>
      </div>

      <div class="bar-wrap">
        <div class="bar-fill ${b.color}" id="bar-${i}" style="width:${p}%"></div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">경과</span>
          <span class="stat-val pct ${b.color}">${p}<span style="font-size:14px">%</span></span>
        </div>
        <div class="stat" style="text-align:center">
          <span class="stat-label">현재 페이지</span>
          <span class="stat-val ${b.color}" id="cur-${i}">${cur}p</span>
        </div>
        <div class="stat" style="text-align:right">
          <span class="stat-label">잔여</span>
          <span class="stat-val remain" id="rem-${i}">${remain}p</span>
        </div>
      </div>

      <div class="input-row">
        <span class="input-label">오늘까지</span>
        <input
          class="page-input"
          type="number"
          id="input-${i}"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="${cur || '페이지 입력'}"
          min="0"
          max="${b.total}"
          value="${cur || ''}"
        >
        <button class="save-btn" onclick="update(${i})">저장</button>
      </div>
    </div>`;
  }).join('');

  // Enter key support
  BOOKS.forEach((_, i) => {
    document.getElementById(`input-${i}`).addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); update(i); }
    });
  });
}

function update(i) {
  const input = document.getElementById(`input-${i}`);
  const val = parseInt(input.value, 10);
  if (isNaN(val) || val < 0) { showToast('올바른 페이지를 입력해요!', true); return; }

  const b = BOOKS[i];
  const clamped = Math.min(val, b.total);
  progress[i] = clamped;
  saveProgress(progress);

  // Update DOM without full re-render
  const p = pct(clamped, b.total);
  const remain = b.total - clamped;

  document.getElementById(`bar-${i}`).style.width = p + '%';
  document.getElementById(`cur-${i}`).textContent = clamped + 'p';
  document.getElementById(`rem-${i}`).textContent = remain + 'p';

  // Update pct display
  const card = document.getElementById(`card-${i}`);
  card.querySelectorAll('.stat-val.pct')[0].innerHTML =
    `${p}<span style="font-size:14px">%</span>`;

  if (clamped >= b.total) {
    card.classList.add('is-complete');
  } else {
    card.classList.remove('is-complete');
  }

  input.value = clamped;
  input.placeholder = clamped;

  renderSummary();
  showToast(`${b.emoji} ${clamped}p 저장됐어요 ✓`);
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--accent1)' : 'var(--accent3)';
  t.style.color = isError ? '#fff' : '#0e1f10';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function confirmReset() {
  if (confirm('진도를 전부 초기화할까요?')) {
    progress = {};
    saveProgress(progress);
    renderCards();
    renderSummary();
    showToast('초기화됐어요');
  }
}

renderDate();
renderSummary();
renderCards();
</script>
</body>
</html>
